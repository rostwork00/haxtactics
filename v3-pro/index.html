<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />

  <title>HAXTACTICS — Pro</title>

  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/v3-pro/styles.css" />

<body class="layout-pro">

    <!-- Brand -->
    <div class="brand-block">
      <a class="brand-mark" href="/" title="HAXTACTICS" aria-label="HAXTACTICS">

        <img class="brand-img is-light" src="/assets/avatar-light.svg" alt="" />

      <button class="side-collapse brand-collapse" data-action="toggle-sidebar" aria-label="Collapse sidebar" title="Collapse [ ​]">

      </button>
    </div>

    <div class="hr"></div>

    <!-- Shortcuts section -->

        <svg class="sec-chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>

      <div class="sec-body shortcuts-inline">
        <div class="kr"><span class="lab">Move piece</span><span class="kbd-group"><kbd>LMB</kbd></span></div>

        <div class="kr"><span class="lab">Delete piece</span><span class="kbd-group"><kbd>2×LMB</kbd></span></div>
        <div class="kr"><span class="lab">Undo</span><span class="kbd-group"><kbd>⌃</kbd><kbd>Z</kbd></span></div>
        <div class="kr"><span class="lab">Save step</span><span class="kbd-group"><kbd>Space</kbd></span></div>

      </div>

    <section class="sec" data-sec-id="field">
      <button class="sec-head" data-collapsible type="button">
        <span class="sec-num">02</span>

        <span class="sec-title">Actions</span>

        <button class="act pro" data-action="undo">

          <span>Undo</span>

        <button class="act pro" data-action="clear-arrows">

          <span>Clear arrows</span>

        <button class="act pro" data-action="clear-annotations">

          <button class="seg-btn" data-mode-set="sandbox">
            <svg viewBox="0 0 24 24"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg>

            Steps
          </button>
        </div>

        <button class="btn-primary" data-action="save-step">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>

        <button class="btn-link" data-action="clear-pending">Clear draft</button>

        <div class="step-list" data-step-list></div>

        <!-- Radius controls -->

          <div class="rad-row">

            <input type="range" min="6" max="50" step="1" value="20" data-radius-input class="rad-slider" />
            <span class="rad-val" data-radius-val>20%</span>
          </div>
          <div class="rad-derived">
            <span class="rad-lab">Ball</span>
            <span class="rad-mult-tag">×1.7</span>
            <span class="rad-val" data-ball-val>34%</span>

        </div>
      </div>

    <!-- Footer status -->

        <span class="item arr"><span class="swatch"></span><span data-count="arrows">0</span></span>

          <button class="tool-btn" data-tool="arrow" title="Arrow (A)" aria-label="Arrow">

            <svg viewBox="0 0 24 24"><path d="M5 5h14M12 5v14M8 19h8"/></svg>
          </button>

        <div class="tool-sep"></div>

        <div class="color-group" role="group" aria-label="Color">
          <button class="color-swatch" data-color="#FF8A4C" style="--c:#FF8A4C" aria-label="Orange"></button>

          <button class="color-swatch" data-color="#F4F3EE" style="--c:#F4F3EE" aria-label="White"></button>

        <div class="tool-sep"></div>

        <div class="text-group" data-tool-context="text" hidden>

          <input type="range" min="10" max="48" step="1" value="18" data-font-size-input class="size-slider" title="Font size" />

    <canvas id="board"></canvas>

    <!-- Support block (bottom-right) -->
    <a class="support-fab kofi" href="https://ko-fi.com/haxdev" target="_blank" rel="noopener noreferrer" title="Підтримати на Ko-fi">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h13v6a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><path d="M16 10h2a3 3 0 0 1 0 6h-2"/><path d="M7 3c0 1.5 1 1.5 1 3M10 3c0 1.5 1 1.5 1 3M13 3c0 1.5 1 1.5 1 3"/></svg>
      <span>Ko-fi</span>
    </a>
  </main>


  <script src="/app.js"></script>
  <script>
    // Sidebar collapse / expand
    (function () {
      const KEY = "hax_sidebar_collapsed_v1";
      const body = document.body;
      function set(collapsed) {
        body.classList.toggle("sidebar-collapsed", collapsed);
        try { localStorage.setItem(KEY, collapsed ? "1" : "0"); } catch {}
        // Wait for slide transition, then trigger canvas resize
        setTimeout(() => window.dispatchEvent(new Event("resize")), 320);
      }
      function toggle() { set(!body.classList.contains("sidebar-collapsed")); }
      try {
        if (localStorage.getItem(KEY) === "1") body.classList.add("sidebar-collapsed");
      } catch {}
      document.querySelectorAll('[data-action="toggle-sidebar"]').forEach(b =>
        b.addEventListener("click", toggle)
      );
      window.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
        if (e.key === "[" || e.key === "х") { e.preventDefault(); toggle(); }
      });
    })();

    // Collapsible sections — animate via the *actual* content height
    // (scrollHeight) rather than max-height: 3200px so the transition
    // doesn't snap at the end (the previous version animated mostly
    // invisible "empty" max-height before reaching real content).
    (function () {
      const KEY = "hax_sec_collapsed_v1";
      const DEFAULT_COLLAPSED = { steps: true };
      let collapsed = {};
      try { collapsed = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch {}

      document.querySelectorAll(".sec[data-sec-id]").forEach(sec => {
        const id = sec.dataset.secId;
        const body = sec.querySelector(".sec-body");
        const isCollapsed = Object.prototype.hasOwnProperty.call(collapsed, id)
          ? !!collapsed[id]
          : !!DEFAULT_COLLAPSED[id];
        sec.classList.toggle("collapsed", isCollapsed);
        // Set initial inline max-height so first toggle has a defined start.
        if (body) body.style.maxHeight = isCollapsed ? "0px" : "none";

        const head = sec.querySelector("[data-collapsible]");
        if (!head || !body) return;

        head.addEventListener("click", () => {
          const willCollapse = !sec.classList.contains("collapsed");
          if (willCollapse) {
            // collapsing: snap to current measured height first so the
            // transition has a real starting value to interpolate from.
            body.style.maxHeight = body.scrollHeight + "px";
            // force a reflow so the browser commits the starting value
            // before we set the end value.
            void body.offsetHeight;
            requestAnimationFrame(() => {
              sec.classList.add("collapsed");
              body.style.maxHeight = "0px";
            });
          } else {
            // expanding: start from 0, animate to current scrollHeight.
            sec.classList.remove("collapsed");
            const target = body.scrollHeight;
            body.style.maxHeight = target + "px";
            const onEnd = (e) => {
              if (e.propertyName !== "max-height") return;
              // Only release the cap if we're still expanded — the user
              // may have re-collapsed mid-transition.
              if (!sec.classList.contains("collapsed")) {
                body.style.maxHeight = "none";
              }
            };
            body.addEventListener("transitionend", onEnd, { once: true });
          }
          collapsed[id] = sec.classList.contains("collapsed");
          try { localStorage.setItem(KEY, JSON.stringify(collapsed)); } catch {}
        });
      });
    })();

    // Apply saved theme on load. The click handler itself lives in app.js
    // (so we don't double-toggle — app.js wires every [data-action] button).
    (function () {
      try {
        const saved = localStorage.getItem("hax_theme_v1");
        if (saved === "light" || saved === "dark") {
          document.documentElement.dataset.theme = saved;
        }
      } catch {}
    })();

    // Live counts
    (function () {
      const get = (k) => document.querySelector(`[data-count="${k}"]`);
      const els = { red: get("red"), blue: get("blue"), arrows: get("arrows") };
      function tick() {
        if (window.HAX) {
          const c = window.HAX.counts();
          if (els.red.textContent   !== String(c.red))    els.red.textContent   = c.red;
          if (els.blue.textContent  !== String(c.blue))   els.blue.textContent  = c.blue;
          if (els.arrows.textContent!== String(c.arrows)) els.arrows.textContent= c.arrows;
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();

    // ---- Steps UI wiring -------------------------------------------------
    (function () {
      function $(sel, root) { return (root || document).querySelector(sel); }
      function $$(sel, root) { return [...(root || document).querySelectorAll(sel)]; }

      const stepListEl   = $("[data-step-list]");
      const stepCountEl  = $("[data-step-count]");
      const pendingEl    = $("[data-pending]");
      const currentStepEl= $("[data-current-step]");
      const pendingMirror= $("[data-pending-mirror]");
      const pieceTotalEl = $("[data-piece-total]");
      const playBtn      = document.querySelector('[data-action="play-steps"]');
      const saveBtn      = document.querySelector('[data-action="save-step"]');
      const clearBtn     = document.querySelector('[data-action="clear-pending"]');
      const pngBtn       = document.querySelector('[data-action="export-png"]');
      const radiusInput  = document.querySelector('[data-radius-input]');
      const radiusVal    = document.querySelector('[data-radius-val]');
      const ballVal      = document.querySelector('[data-ball-val]');
      const recBadge     = document.querySelector('[data-rec-badge]');

      function fmtPct(v) { return Math.round(v * 100) + "%"; }

      function renderStepList() {
        if (!window.HAX) return;
        const steps = window.HAX.steps();
        stepCountEl.textContent = steps.length;
        if (steps.length === 0) {
          stepListEl.innerHTML = '<div class="step-empty">No steps yet. Draw arrows for players and click <b>Save step</b>.</div>';
          playBtn.disabled = true;
          return;
        }
        playBtn.disabled = false;
        const isPlaying = window.HAX.isPlaying();
        const playingIdx = window.HAX.playingStep();
        stepListEl.innerHTML = steps.map((s, i) => {
          const moves = s.moves.filter(m => Math.hypot(m.toFx - m.fromFx, m.toFy - m.fromFy) > 0.001).length;
          const active = isPlaying && i === playingIdx ? " active" : "";
          return `<div class="step-row${active}" data-idx="${i}">
            <span class="step-idx">#${i + 1}</span>
            <span class="step-meta">${moves} ${moves === 1 ? "move" : "moves"}</span>
            <button class="step-del" data-del-step="${i}" aria-label="Delete step">
              <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>`;
        }).join("");
        stepListEl.querySelectorAll("[data-del-step]").forEach(b => {
          b.addEventListener("click", () => {
            window.HAX.deleteStep(parseInt(b.dataset.delStep, 10));
          });
        });
      }

      function renderBadge() {
        if (!window.HAX) return;
        const steps = window.HAX.stepCount();
        const pending = window.HAX.pendingMoves();
        const totalPieces = window.HAX.counts().red + window.HAX.counts().blue + window.HAX.counts().ball;
        const playing = window.HAX.isPlaying();
        const playingIdx = window.HAX.playingStep();
        const mode = window.HAX.getMode();

        pendingEl.textContent = pending;
        pendingMirror.textContent = pending;
        pieceTotalEl.textContent = totalPieces;
        currentStepEl.textContent = playing
          ? `${playingIdx + 1} / ${steps}`
          : (steps + 1);

        // Badge labels switch based on mode
        const labelEl = recBadge.querySelector(".rec-label");
        if (mode === "sandbox") {
          recBadge.classList.add("sandbox");
          recBadge.classList.remove("playing", "has-pending");
          if (labelEl) labelEl.textContent = "Sandbox";
          recBadge.querySelectorAll(".rec-step, .rec-pending, .rec-sep").forEach(el => el.style.display = "none");
        } else {
          recBadge.classList.remove("sandbox");
          if (labelEl) labelEl.textContent = "Step Editor";
          recBadge.querySelectorAll(".rec-step, .rec-pending, .rec-sep").forEach(el => el.style.display = "");
          recBadge.classList.toggle("playing", playing);
          recBadge.classList.toggle("has-pending", pending > 0);
        }

        playBtn.classList.toggle("playing", playing);
        playBtn.querySelector("span").textContent = playing ? "Stop" : "Play";
        saveBtn.classList.toggle("ready", pending > 0);
        saveBtn.disabled = playing || pending === 0 || mode !== "steps";
        clearBtn.disabled = playing || pending === 0;
        playBtn.disabled = mode !== "steps" || steps === 0;
        pngBtn.disabled = false;

        // Update mode segmented control
        document.querySelectorAll("[data-mode-set]").forEach(b => {
          b.classList.toggle("on", b.dataset.modeSet === mode);
        });
        // Disable radius slider in sandbox
        if (radiusInput) radiusInput.disabled = mode !== "steps";
        document.querySelector(".radius-block")?.classList.toggle("disabled", mode !== "steps");
      }

      function refresh() {
        renderStepList();
        renderBadge();
        renderRadius();
      }

      function renderRadius() {
        if (!window.HAX) return;
        const r = window.HAX.getRadius();
        if (radiusInput) radiusInput.value = String(Math.round(r.player * 100));
        if (radiusVal)   radiusVal.textContent = fmtPct(r.player);
        if (ballVal)     ballVal.textContent = fmtPct(r.ball);
      }

      // Wait for HAX to be available
      const waiter = setInterval(() => {
        if (!window.HAX) return;
        clearInterval(waiter);

        saveBtn.addEventListener("click", () => window.HAX.saveStep());
        clearBtn.addEventListener("click", () => window.HAX.clearPendingArrows());
        pngBtn.addEventListener("click", () => window.HAX.exportPNG());
        playBtn.addEventListener("click", () => {
          if (window.HAX.isPlaying()) window.HAX.stopPlayback();
          else window.HAX.playSteps();
        });

        // Mode toggle (Sandbox / Steps)
        document.querySelectorAll("[data-mode-set]").forEach(b => {
          b.addEventListener("click", () => {
            window.HAX.setMode(b.dataset.modeSet);
          });
        });
        if (radiusInput) {
          radiusInput.addEventListener("input", (e) => {
            window.HAX.setPlayerRadius(parseInt(e.target.value, 10) / 100);
            renderRadius();
          });
        }

        // Keyboard: Space to save step, P to play
        window.addEventListener("keydown", (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
          if (e.code === "Space") {
            e.preventDefault();
            if (!saveBtn.disabled) window.HAX.saveStep();
          } else if (e.key === "p" || e.key === "з") {
            e.preventDefault();
            if (window.HAX.isPlaying()) window.HAX.stopPlayback();
            else if (window.HAX.stepCount() > 0) window.HAX.playSteps();
          }
        });

        window.addEventListener("hax-state-changed", refresh);
        refresh();
        renderRadius();

        // Tick badge updates too (in case state changes outside of events)
        setInterval(refresh, 250);
      }, 50);
    })();

    // ---- Annotation toolbar wiring ---------------------------------------
    (function () {
      const toolButtons = document.querySelectorAll("[data-tool]");
      const swatches    = document.querySelectorAll(".color-swatch");
      const colorInput  = document.querySelector("[data-color-input]");
      const widthInput  = document.querySelector("[data-width-input]");
      const widthVal    = document.querySelector("[data-width-val]");
      const fontInput   = document.querySelector("[data-font-input]");
      const fontSizeIn  = document.querySelector("[data-font-size-input]");
      const fontSizeVal = document.querySelector("[data-font-size-val]");
      const shapeGroup  = document.querySelector('[data-tool-context="shape"]');
      const textGroup   = document.querySelector('[data-tool-context="text"]');

      function syncToolUI() {
        if (!window.HAX) return;
        const tool = window.HAX.getTool();
        toolButtons.forEach(b => b.classList.toggle("on", b.dataset.tool === tool));
        // Show width controls for shape tools, font controls for text tool,
        // hide both for "select" mode (nothing to configure).
        const isShape = tool === "line" || tool === "circle" || tool === "arrow" || tool === "pencil";
        const isText  = tool === "text";
        shapeGroup.hidden = !isShape;
        textGroup.hidden  = !isText;
      }
      function syncStyleUI() {
        if (!window.HAX) return;
        const s = window.HAX.getAnnotationStyle();
        swatches.forEach(b => b.classList.toggle("on",
          b.dataset.color.toLowerCase() === String(s.color).toLowerCase()));
        if (colorInput)  colorInput.value = s.color;
        if (widthInput)  widthInput.value = String(s.width);
        if (widthVal)    widthVal.textContent = String(s.width);
        if (fontInput)   fontInput.value = s.font;
        if (fontSizeIn)  fontSizeIn.value = String(s.fontSize);
        if (fontSizeVal) fontSizeVal.textContent = String(s.fontSize);
      }

      const waiter = setInterval(() => {
        if (!window.HAX) return;
        clearInterval(waiter);

        toolButtons.forEach(b => {
          b.addEventListener("click", () => {
            window.HAX.setTool(b.dataset.tool);
            syncToolUI();
          });
        });
        swatches.forEach(b => {
          b.addEventListener("click", () => {
            window.HAX.setAnnotationStyle({ color: b.dataset.color });
            syncStyleUI();
          });
        });
        if (colorInput) {
          colorInput.addEventListener("input", (e) => {
            window.HAX.setAnnotationStyle({ color: e.target.value });
            syncStyleUI();
          });
        }
        if (widthInput) {
          widthInput.addEventListener("input", (e) => {
            window.HAX.setAnnotationStyle({ width: parseInt(e.target.value, 10) });
            syncStyleUI();
          });
        }
        if (fontInput) {
          fontInput.addEventListener("change", (e) => {
            window.HAX.setAnnotationStyle({ font: e.target.value });
          });
        }
        if (fontSizeIn) {
          fontSizeIn.addEventListener("input", (e) => {
            window.HAX.setAnnotationStyle({ fontSize: parseInt(e.target.value, 10) });
            syncStyleUI();
          });
        }
        // Clear annotations button (in the sidebar actions section)
        document.querySelectorAll('[data-action="clear-annotations"]').forEach(b => {
          b.addEventListener("click", () => window.HAX.clearAnnotations());
        });

        // Keyboard shortcuts for tools (ignored while typing in inputs)
        window.addEventListener("keydown", (e) => {
          const tag = e.target.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
          if (e.ctrlKey || e.metaKey || e.altKey) return;
          // Use e.code to be layout-agnostic.
          const map = {
            KeyV: "select", KeyL: "line", KeyC: "circle",
            KeyA: "arrow",  KeyT: "text", KeyB: "pencil",
          };
          const tool = map[e.code];
          if (tool) {
            e.preventDefault();
            window.HAX.setTool(tool);
            syncToolUI();
          }
        });

        window.addEventListener("hax-state-changed", () => {
          syncToolUI();
          syncStyleUI();
        });
        syncToolUI();
        syncStyleUI();
      }, 50);
    })();
  </script>
</body>
</html>
