<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HAX Tactics avatar">
  <title>HAX Tactics</title>

  <rect width="512" height="512" fill="#FBFAF6"></rect>

  <defs>
